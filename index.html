<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="./src/assets/icons/picture.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>gallery</title>
    <!--  CSS style  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="src/styles/globall.css"/>
    <link rel="stylesheet" href="src/styles/search_form.css"/>
    <link rel="stylesheet" href="src/styles/load_more.css"/>
    <link rel="stylesheet" href="src/styles/main.css"/>
    <!--  Script JS  -->
    <script type="module" src="src/components/render-list-photo.js" defer></script>
    <script type="module" src="src/components/pixabay-api.js" defer></script>
</head>
<body>
<div class="wrapper">
    <header class="header">
        <!-- Search input -->
        <form id="search_form_container" autocomplete="off" novalidate>
            <!-- Form elements -->
            <label>
                <input type="text"
                       id="name_photo"
                       name="name_photo"
                       placeholder="Search images..."
                       minlength="3"
                       required
                />
            </label>
            <button class="search" type="submit">Search</button>
        </form>
    </header>
    <main class="gallery">
        <!-- Block photo -->
        <ul class="gallery_list"></ul>
        <button id="load_more" class="btn_load_more" type="submit">Load more</button>
    </main>
</div>
</body>
</html>
